name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
      placeholder: When I click X, Y happens instead of Z...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker Compose
        - Local development (npm run dev)
        - Other
    validations:
      required: true

  - type: input
    id: llm-provider
    attributes:
      label: LLM Provider
      description: Which AI provider are you using?
      placeholder: "e.g., openai, anthropic, gemini, ollama"

  - type: input
    id: image-provider
    attributes:
      label: Image Provider
      description: Which image generation provider are you using?
      placeholder: "e.g., openai, gemini, stability, replicate"

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant logs (browser console, Docker logs, etc.)
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this hasn't been reported yet
          required: true
